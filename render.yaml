services:
  # Backend Service
  - type: web
    name: legaleaseai-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_vD8orTxFnJX1@ep-purple-bar-adj2wp57-pooler.c-2.us-east-1.aws.neon.tech/neondb?sslmode=require
      - key: JWT_SECRET
        value: D9f7x!qZ3vP#s8Lb@kRnW2eTmY6UcJ0HgF1oVzX$CjwEa4MdS5Iq7NyplRuOBt
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        value: takshgandhi4@gmail.com
      - key: SMTP_PASS
        value: geehdeqajjsrykip
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

  # Frontend Service
  - type: web
    name: legaleaseai-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: redirect
        source: /api/*
        destination: https://legaleaseai-backend.onrender.com$1
        status: 200
      - type: rewrite
        source: /*
        destination: /index.html
        status: 200

